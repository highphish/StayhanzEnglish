<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a5fb4">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Inglés desde tu español</title>
<style>
:root{
  --bg:#f7f5f0; --card:#ffffff; --ink:#1c1b19; --muted:#6b675f;
  --brand:#1a5fb4; --brand2:#15803d; --warn:#b45309; --bad:#b91c1c; --good:#15803d;
  --quien:#1d4ed8; --accion:#dc2626; --que:#7c3aed; --cuando:#15803d;
  --line:#e2ddd2; --r:18px; --sh:0 2px 10px rgba(0,0,0,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
/* 눌림 피드백: 기능 있는 모든 요소 — 누르면 줄고 어두워진다 (CSS만, 고사양 불필요) */
button,.litem,.mbtn,.opt,.sesbtn,.nextact,.lt,.lv,.chip,.dot,select{transition:transform .07s ease,filter .07s ease}
button:active,.litem:active,.mbtn:active,.opt:active,.sesbtn:active,.nextact:active,.lt:active,.lv:active,select:active{transform:scale(.95);filter:brightness(.88)}
button:not(:disabled),.litem,.mbtn,.opt,.sesbtn,.nextact{cursor:pointer}
html,body{margin:0;min-height:100%}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans",sans-serif;font-size:18px;line-height:1.65;padding-bottom:calc(96px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);padding:10px 14px;display:flex;align-items:center;gap:10px}
header h1{font-size:18px;margin:0;flex:1;font-weight:800}
header .streak{font-size:16px;font-weight:700;color:var(--warn);white-space:nowrap}
.back{border:none;background:#eee9df;border-radius:12px;font-size:22px;padding:6px 14px;cursor:pointer}
main{max-width:min(94vw,760px);margin:0 auto;padding:16px}
.screen{display:none}.screen.on{display:block}
.hometitle{text-align:center;margin:8px 0 2px;font-size:26px;font-weight:800}
.homesub{text-align:center;color:var(--muted);margin:0 0 14px;font-size:16px}
.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.mbtn{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:18px 12px;text-align:center;cursor:pointer;transition:.1s}
.mbtn:active{transform:scale(.97)}
.mbtn .ico{font-size:44px;display:block;margin-bottom:6px}
.mbtn .t{font-weight:800;font-size:19px;display:block}
.mbtn .s{color:var(--muted);font-size:14px;display:block;margin-top:2px}
.mbtn.wide{grid-column:1/-1}
.levelbar{display:flex;gap:8px;justify-content:center;margin:12px 0}
.lv{border:2px solid var(--line);background:var(--card);border-radius:999px;padding:8px 18px;font-size:17px;font-weight:700;cursor:pointer}
.lv.on{background:var(--brand);border-color:var(--brand);color:#fff}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:22px 18px;margin:18px 0}
.bigword{font-size:clamp(34px,9vw,54px);font-weight:800;text-align:center;line-height:1.15;margin:6px 0}
.bigword.es{color:#0e7490}.bigword.en{color:#92400e}
.pos{display:inline-block;background:#ede9fe;color:#5b21b6;border-radius:8px;padding:2px 10px;font-size:15px;font-weight:700;margin-left:6px;vertical-align:middle}
.center{text-align:center}
.muted{color:var(--muted)}
.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center}
button.b{border:none;border-radius:14px;padding:14px 20px;font-size:18px;font-weight:700;cursor:pointer;background:#eee9df;color:var(--ink)}
button.b:active{transform:scale(.97)}
button.b.p{background:var(--brand);color:#fff}
button.b.g{background:var(--brand2);color:#fff}
button.b.w{background:var(--warn);color:#fff}
button.b.r{background:var(--bad);color:#fff}
button.b.big{font-size:22px;padding:18px 26px;width:100%}
button.spk{border:none;background:#dbeafe;color:#1d4ed8;border-radius:50%;width:52px;height:52px;font-size:24px;cursor:pointer;flex:none}
button.spk.sm{width:40px;height:40px;font-size:18px}
button.spk:active{transform:scale(.92)}
.opt{display:block;width:100%;text-align:left;background:var(--card);border:2px solid var(--line);border-radius:14px;padding:16px;font-size:19px;font-weight:600;margin:12px 0;cursor:pointer;line-height:1.5}
.opt.ok{border-color:var(--good);background:#dcfce7}
.opt.no{border-color:var(--bad);background:#fee2e2}
.progress{height:10px;background:#e7e2d8;border-radius:99px;overflow:hidden;margin:10px 0}
.progress>div{height:100%;background:var(--brand);border-radius:99px;transition:.3s}
.frame{display:flex;gap:10px;row-gap:16px;flex-wrap:wrap;justify-content:center;font-size:24px;font-weight:800;margin:16px 0;line-height:1.5}
.fp{padding:4px 8px;border-radius:8px}
.fp.quien{color:var(--quien);border-bottom:4px solid var(--quien)}
.fp.accion{color:var(--accion);border-bottom:4px double var(--accion)}
.fp.que{color:var(--que);border-bottom:4px dotted var(--que)}
.fp.cuando{color:var(--cuando);border-bottom:4px solid var(--cuando);border-bottom-style:wavy;text-decoration:underline wavy var(--cuando);border-bottom:none}
.legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;font-size:14px;margin:6px 0}
.legend span{padding:2px 8px;border-radius:6px;font-weight:700}
.tag{display:inline-block;border-radius:8px;padding:2px 10px;font-size:14px;font-weight:800}
.tag.safe{background:#dcfce7;color:#15803d}.tag.split{background:#fef3c7;color:#b45309}
.tag.trap{background:#fee2e2;color:#b91c1c}.tag.relief{background:#dbeafe;color:#1d4ed8}.tag.new{background:#ede9fe;color:#6d28d9}
.list{display:flex;flex-direction:column;gap:14px}
.litem{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer}
.litem .ico{font-size:30px;flex:none}
.litem .tx{flex:1}.litem .tx b{font-size:18px}.litem .tx small{color:var(--muted);display:block}
.timerbig{font-size:40px;font-weight:800;text-align:center;color:var(--brand)}
.gesture{background:#fff7ed;border:1px dashed var(--warn);border-radius:12px;padding:8px 12px;font-size:16px;margin-top:8px}
.sospic{width:112px;height:112px;margin:0 auto;background:#eff6ff;border-radius:24px;padding:14px}
.sospic.sm{width:40px;height:40px;margin:0;flex:none;border-radius:10px;padding:5px}
.sospic svg{width:100%;height:100%;display:block}
.opt.sositem{display:flex;align-items:center;gap:10px}
.storyline{margin:14px 0;padding:14px;border-radius:12px;background:#f4f1ea;display:flex;gap:12px;align-items:flex-start}
.storyline.hide .txt{filter:blur(6px)}
.storyline .txt{flex:1;font-size:19px;line-height:1.65}
.storyline .es{color:var(--muted);font-size:16px;display:block;margin-top:6px;line-height:1.5}
.trap{background:#fef08a;border-radius:6px;padding:0 4px;cursor:pointer;font-weight:700}
.bline{margin:12px 0;padding:12px 14px;border-radius:12px;background:#f4f1ea;display:flex;gap:10px;align-items:flex-start;cursor:pointer;border-left:5px solid transparent}
.bline .n{color:var(--muted);font-size:14px;min-width:22px;text-align:right;padding-top:4px}
.bline .txt{flex:1;font-size:20px;line-height:1.65}
.bline .es{color:var(--muted);font-size:16px;display:block;margin-top:4px}
.bline.cur{background:#fef3c7;border-left-color:var(--warn)}
.bline.mA{border-left-color:var(--brand);background:#eff6ff}
.bline.mB{border-left-color:var(--brand2);background:#f0fdf4}
.readbar{position:sticky;top:62px;z-index:15;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh);padding:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center;margin-bottom:8px}
.readbar select{font-size:15px;padding:8px;border-radius:10px;border:1px solid var(--line);max-width:200px}
.rate{border:2px solid var(--line);background:var(--card);border-radius:999px;padding:7px 12px;font-size:15px;font-weight:700;cursor:pointer}
.rate.on{background:var(--brand);border-color:var(--brand);color:#fff}
.ratewrap{display:flex;align-items:center;gap:8px;flex:1;min-width:200px;font-size:18px}
.ratewrap b{min-width:52px;font-size:15px;color:var(--brand)}
input[type=range]{flex:1;height:34px;accent-color:var(--brand);cursor:pointer;min-width:90px}
.recbar{display:flex;gap:10px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.score{font-size:30px;font-weight:800;text-align:center}
.note{background:#eff6ff;border-left:5px solid var(--brand);border-radius:8px;padding:10px 14px;font-size:16px;margin:10px 0}
.note.w{background:#fff7ed;border-color:var(--warn)}
.offline-pill{font-size:13px;background:#dcfce7;color:#15803d;border-radius:99px;padding:3px 10px;font-weight:700}
.offline-pill.off{background:#fee2e2;color:#b91c1c}
.fbox{background:#fee2e2;border-radius:12px;padding:12px;margin:8px 0}
.fbox b{color:var(--bad)}
footer{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;justify-content:center;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
footer button{flex:1 1 0;max-width:170px;border:none;background:none;padding:10px 4px 12px;font-size:12px;color:var(--muted);cursor:pointer}
footer button .fi{display:block;font-size:24px}
footer button.on{color:var(--brand);font-weight:800}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
/* sesión de hoy */
.sesbtn{background:linear-gradient(135deg,#1a5fb4,#15803d);color:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:18px;text-align:center;cursor:pointer;margin:12px 0}
.sesbtn .t{font-size:22px;font-weight:800}.sesbtn .s{font-size:15px;opacity:.9}
.dots{display:flex;gap:6px;justify-content:center;margin:10px 0;flex-wrap:wrap}
.dot{padding:6px 10px;border-radius:99px;font-size:13px;font-weight:700;background:#e7e2d8;color:var(--muted)}
.dot.cur{background:var(--brand);color:#fff}.dot.done{background:#dcfce7;color:#15803d}
.sline{display:flex;align-items:center;gap:3px;justify-content:center;margin:2px 0 6px;white-space:nowrap}
.sstep{opacity:.3;font-size:15px;line-height:1}.sstep.cur{opacity:1;font-size:20px}.sstep.done{opacity:.75}
.sarrow{opacity:.3;font-size:10px}.scur{margin-left:7px;font-size:12px;color:var(--muted);font-weight:700}
/* 폰 화면 한 화면 풀이: 세로가 짧으면 여백·글자 압축 */
@media(max-height:760px){
 main{padding:10px 12px}body{padding-bottom:calc(76px + env(safe-area-inset-bottom))}
 .card{padding:12px 14px;margin:8px 0}
 .opt{padding:10px 12px;margin:6px 0;font-size:17px;border-radius:12px}
 .bigword{font-size:clamp(22px,6.5vw,32px)!important;margin:2px 0}
 .progress{margin:4px 0;height:8px}
 .card .muted{font-size:14px}
 .note{padding:7px 10px;font-size:14px;margin:6px 0}
 .menu{gap:8px}.mbtn{padding:12px 8px}.mbtn .ico{font-size:32px;margin-bottom:2px}
 .sospic{width:84px;height:84px;padding:10px}
 button.b.big{padding:13px 18px;font-size:19px}}
/* mapa de comprensión */
.gauge{display:flex;align-items:center;gap:10px;margin:8px 0}
.gauge .gl{min-width:118px;font-size:15px;font-weight:700}
.gauge .gb{flex:1;height:12px;background:#e7e2d8;border-radius:99px;overflow:hidden}
.gauge .gb>div{height:100%;border-radius:99px}
.gauge .gp{min-width:42px;text-align:right;font-size:14px;color:var(--muted)}
.nextact{background:#eff6ff;border:2px solid var(--brand);border-radius:14px;padding:14px;display:flex;align-items:center;gap:10px;cursor:pointer;margin:10px 0}
/* reflexión */
.lights{display:flex;gap:8px;justify-content:center}
.lt{font-size:24px;padding:6px 10px;border-radius:12px;border:2px solid transparent;cursor:pointer;background:#f4f1ea}
.lt.on{border-color:var(--brand);background:#eff6ff}
input.tx,textarea.tx{width:100%;font-size:17px;padding:12px;border-radius:12px;border:1.5px solid var(--line);background:#fff;font-family:inherit;margin:6px 0}
/* noticing */
.ntc{background:#e0f2fe;border-radius:4px;padding:0 3px;border-bottom:2px solid #0284c7}
.planring{font-size:36px;font-weight:800;color:var(--warn);text-align:center}
.errtag{display:inline-block;background:#fee2e2;color:#b91c1c;border-radius:8px;padding:2px 10px;font-size:14px;font-weight:700;margin:2px}
/* 전역 정지/내 목소리 바 */
.stopbar{position:fixed;bottom:calc(66px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);display:none;gap:8px;z-index:30;background:var(--card);padding:8px 10px;border-radius:99px;box-shadow:0 4px 18px rgba(0,0,0,.18);border:1px solid var(--line);align-items:center}
.hdrow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0;flex-wrap:wrap}
.hdrow .nm{flex:1;min-width:140px;font-weight:700}
.hdrow .pg{font-size:14px;color:var(--brand);font-weight:800;min-width:44px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
.stat b{font-size:26px;display:block;color:var(--brand)}
.stat small{color:var(--muted)}
/* ===== responsive: teléfonos pequeños → tablets ===== */
@media(max-width:360px){body{font-size:16px}.bigword{font-size:clamp(26px,8vw,38px)}
 button.b{padding:12px 14px;font-size:16px}.mbtn .ico{font-size:36px}.frame{font-size:20px}}
@media(min-width:700px){body{font-size:19px}main{max-width:780px;padding:24px}
 .storyline{padding:16px 18px}.card{padding:26px 24px}
 .list{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:stretch}
 .list .litem{margin:0}}
@media(min-width:1000px){body{font-size:20px}main{max-width:880px}
 .menu{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
 .bline .txt{font-size:22px}.storyline .txt{font-size:21px}
 header{padding:12px 24px}header h1{font-size:20px}}
@media(orientation:landscape) and (max-height:480px){
 body{padding-bottom:70px}.card{padding:14px}.bigword{font-size:clamp(24px,5vh,36px)}
 footer button .fi{display:inline;font-size:18px;margin-right:4px}}
</style>
</head>
<body>
<header>
  <button class="back" id="btnBack" style="display:none">←</button>
  <h1 id="hTitle">Inglés desde tu español</h1>
  <span class="offline-pill" id="netPill">📴 sin internet ✓</span>
  <span class="streak" id="streak">🔥0</span>
</header>
<main id="main"></main>
<footer>
  <button data-nav="home" class="on"><span class="fi">🏠</span>Inicio</button>
  <button data-nav="vocab"><span class="fi">📚</span>Palabras</button>
  <button data-nav="verbs"><span class="fi">⚙️</span>Verbos</button>
  <button data-nav="sos"><span class="fi">🆘</span>SOS</button>
  <button data-nav="stories"><span class="fi">🎧</span>Historias</button>
</footer>
<script src="data.js"></script>
<script>
"use strict";
// ================= util =================
const $=s=>document.querySelector(s), main=document.getElementById('main');
const rnd=a=>a[Math.floor(Math.random()*a.length)];
const shuf=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
// ================= estado =================
const ST=JSON.parse(localStorage.getItem('ides_state')||'{}');
ST.level=ST.level||'A1'; ST.scores=ST.scores||{}; ST.seen=ST.seen||{}; ST.bookPos=ST.bookPos||{};
ST.srs=ST.srs||{};      // memoria de repaso: {clave:{b caja,d vence,n vistos,w errores,fs racha,t tag,fx vencido}}
ST.acc=ST.acc||{};      // precisión por área (últimos 20)
ST.reflect=ST.reflect||[]; // diario: luces, victorias, intención
ST.idc=ST.idc||0;       // contador de identidad: sesiones completadas
ST.etapa=ST.etapa||0;ST.etapaSes=ST.etapaSes||0; // posición en Mi camino (24 etapas)
const RD={on:false,a:null,b:null,sel:0}; // lector de cuentos
const SES={on:false,stage:-1,keys:[],primeAcc:null,retAcc:null,t0:0,breakShown:false}; // Sesión de hoy
function save(){localStorage.setItem('ides_state',JSON.stringify(ST))}
(function streak(){const t=new Date().toDateString();
 if(ST.lastDay!==t){const y=new Date(Date.now()-864e5).toDateString();
  ST.streak=(ST.lastDay===y)?(ST.streak||0)+1:1; ST.lastDay=t; save();}
 $('#streak').textContent='🔥'+(ST.streak||1);})();
// ================= red =================
function netUI(){const on=navigator.onLine,p=$('#netPill');
 p.textContent=on?'📶 en línea':'📴 sin internet ✓';p.className='offline-pill'+(on?' off':'');}
addEventListener('online',netUI);addEventListener('offline',netUI);netUI();
// ================= voz (TTS) =================
let VOICES=[];function loadV(){VOICES=speechSynthesis.getVoices()}
loadV();speechSynthesis.onvoiceschanged=loadV;
// puntuación de calidad: voces "Natural/Neural/Premium/Enhanced" primero
const FEM_RE=/samantha|ava|allison|susan|zira|aria|jenny|joanna|salli|kendra|kimberly|ivy|karen|moira|tessa|serena|catherine|nicky|sara|emma|libby|sonia|natasha|female|woman/;
const MASC_RE=/daniel|tom|alex|fred|david|mark|guy|ryan|christopher|eric|brian|justin|aaron|arthur|oliver|james|male(?!ena)|man\b/;
function vScore(v,langPref){let s=0;const n=v.name.toLowerCase(),l=v.lang.replace('_','-').toLowerCase();
 if(l.startsWith(langPref))s+=40;else if(l.startsWith(langPref.slice(0,2)))s+=20;else return -1;
 if(/natural|neural|premium|enhanced|plus/.test(n))s+=30;
 if(/google|microsoft online/.test(n))s+=12;
 if(FEM_RE.test(n))s+=10;else if(MASC_RE.test(n))s+=6; // default: mejor voz femenina en-US
 if(/compact|espeak|eloquence|grandpa|grandma|bells|zarvox|trinoids|whisper|bad news|good news|bubbles|cellos|organ|albert|jester|wobble/.test(n))s-=40;
 if(v.localService)s+=3;
 return s}
function bestVoice(lang){const pref=lang==='en'?'en-us':'es-mx';
 let best=null,bs=-1;
 for(const v of VOICES){const s=vScore(v,pref);if(s>bs){bs=s;best=v}}
 if(!best&&lang==='es'){for(const v of VOICES){if(v.lang.toLowerCase().startsWith('es')){best=v;break}}}
 return best}
function pickVoice(lang){
 const want=lang==='en'?ST.voiceEN:ST.voiceES;
 if(want){const v=VOICES.find(v=>v.name===want);if(v)return v}
 return bestVoice(lang)}
// ===== ✨ Voz HD (Piper neuronal, embebida — modelos se bajan 1 vez y quedan offline en OPFS) =====
const HD={lib:null,stored:[],audio:null,res:null,cache:new Map(),sizes:{}};
const HD_VOICES=[
 {id:'en_US-hfc_female-medium',l:'en',g:'👩',name:'Heather · inglés EE.UU.'},
 {id:'en_US-amy-medium',l:'en',g:'👩',name:'Amy · inglés EE.UU.'},
 {id:'en_US-hfc_male-medium',l:'en',g:'👨',name:'Henry · inglés EE.UU.'},
 {id:'es_MX-claude-high',l:'es',g:'👩',name:'Claudia · español México'},
 {id:'es_ES-sharvard-medium',l:'es',g:'👩',name:'Sara · español España'},
 {id:'es_MX-ald-medium',l:'es',g:'👨',name:'Aldo · español México'}];
async function hdInit(){if(HD.lib)return true;
 try{
  if(!globalThis.ort)await new Promise((res,rej)=>{const s=document.createElement('script');
   s.src='hd/ort.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s)});
  HD.lib=await import('./hd/vits-web.js');
  HD.stored=await HD.lib.stored();
  return true}catch(e){console.warn('HD init falló',e);return false}}
function hdVoiceFor(lang){if(!ST.hd||!HD.lib)return null;
 const want=lang==='en'?ST.hdVoiceEN:ST.hdVoiceES;
 if(want&&HD.stored.includes(want))return want;
 const c=HD_VOICES.find(v=>v.l===lang&&HD.stored.includes(v.id));return c?c.id:null}
const hdOK=lang=>!!hdVoiceFor(lang);
function stopHdAudio(){if(HD.audio){try{HD.audio.pause()}catch(e){}HD.audio=null}
 if(HD.res){const r=HD.res;HD.res=null;r(false)}}
async function hdSpeak(text,lang,rate,vid){vid=vid||hdVoiceFor(lang);if(!vid||!HD.lib)return false;
 try{const key=vid+'|'+text;let blob=HD.cache.get(key);
  if(!blob){blob=await HD.lib.predict({text,voiceId:vid});
   HD.cache.set(key,blob);if(HD.cache.size>150)HD.cache.delete(HD.cache.keys().next().value)}
  return await new Promise(res=>{stopHdAudio();HD.res=res;
   const a=new Audio(URL.createObjectURL(blob));HD.audio=a;
   a.playbackRate=Math.max(0.5,Math.min(2,(rate||ST.rate||0.95)/0.95));
   a.onended=()=>{if(HD.res===res)HD.res=null;res(true)};
   a.onerror=()=>{if(HD.res===res)HD.res=null;res(false)};
   a.play().catch(()=>{if(HD.res===res)HD.res=null;res(false)})})
 }catch(e){console.warn('HD predict',e);return false}}

function speak(text,lang,rate){try{speechSynthesis.cancel()}catch(e){}
 stopHdAudio();
 if(hdOK(lang)){hdSpeak(text,lang,rate);return}
 try{const u=new SpeechSynthesisUtterance(text);u.lang=lang==='en'?'en-US':'es-MX';
 const v=pickVoice(lang);if(v)u.voice=v;u.rate=rate||ST.rate||0.92;speechSynthesis.speak(u);}catch(e){}}
window.spk=(t,l,r)=>speak(t,l,r);
// habla y ESPERA a que termine + pausa antes de seguir (evita cortes)
function speakThen(text,lang,rate,pause,cb){
 if(hdOK(lang)){try{speechSynthesis.cancel()}catch(e){}
  let done=false;const fin=()=>{if(done)return;done=true;setTimeout(cb,pause)};
  hdSpeak(text,lang,rate).then(fin).catch(fin);
  setTimeout(fin,6000+text.length*120);return}
 try{speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang=lang==='en'?'en-US':'es-MX';
  const v=pickVoice(lang);if(v)u.voice=v;u.rate=rate||0.92;
  let done=false;const fin=()=>{if(done)return;done=true;setTimeout(cb,pause)};
  u.onend=fin;u.onerror=fin;
  setTimeout(fin,2000+text.length*100); // red de seguridad si onend no llega
  speechSynthesis.speak(u);
 }catch(e){setTimeout(cb,pause)}}

let mediaRec=null,chunks=[],lastAudio=null,recOn=false;
async function toggleRec(btn,target){ 
 if(recOn){mediaRec.stop();recOn=false;btn.textContent='🎙️ Grabar';btn.classList.remove('r');return}
 try{const st=await navigator.mediaDevices.getUserMedia({audio:true});
  mediaRec=new MediaRecorder(st);chunks=[];
  mediaRec.ondataavailable=e=>chunks.push(e.data);
  mediaRec.onstop=()=>{lastAudio=URL.createObjectURL(new Blob(chunks,{type:mediaRec.mimeType||'audio/mp4'}));
   st.getTracks().forEach(t=>t.stop());stopBar(true);};
  mediaRec.start();recOn=true;btn.textContent='⏹️ Parar';btn.classList.add('r');
 }catch(e){alert('Permita el micrófono para practicar su voz. / 마이크 권한을 허용하세요.')}}

const ES_SUBJ=["yo","tú","él","ella","nosotros","ellos"];
function esForms(v,t){const inf=v.inf,g=inf.slice(-2),st=inf.slice(0,-2),irr=v.irr||{};
 const mk=e=>e.map(x=>st+x);
 switch(t){
  case'pret':return irr.pret||(g==='ar'?mk(['é','aste','ó','amos','aron']):mk(['í','iste','ió','imos','ieron']));
  case'pres':return irr.pres||(g==='ar'?mk(['o','as','a','amos','an']):g==='er'?mk(['o','es','e','emos','en']):mk(['o','es','e','imos','en']));
  case'impf':return irr.impf||(g==='ar'?mk(['aba','abas','aba','ábamos','aban']):mk(['ía','ías','ía','íamos','ían']));
  case'fut':{const r=irr.futR||inf;return['é','ás','á','emos','án'].map(x=>r+x)}
  case'cond':{const r=irr.condR||inf;return['ía','ías','ía','íamos','ían'].map(x=>r+x)}
  case'ger':return irr.ger||st+(g==='ar'?'ando':'iendo');
  case'part':return irr.part||st+(g==='ar'?'ado':'ido');}}
const eIdx=pi=>pi<=2?pi:pi===3?2:pi-1; // ella usa forma de él
function makeItem(slot){ // {esP(prompt), esHint, quien, accion, cuando, full}
 const v=rnd(VERBS);let pi=Math.floor(Math.random()*6);
 const S=ES_SUBJ[pi],EN=P_EN[pi],i=eIdx(pi),b=v.en;
 switch(slot){
  case'pasado':return{es:esForms(v,'pret')[i],hint:S,quien:EN,accion:b[1]};
  case'ahora':return{es:ESTAR[pi]+' '+esForms(v,'ger'),hint:S,quien:EN,accion:P_BE[pi]+' '+b[3]};
  case'plan':return{es:IR_P[pi]+' a '+v.inf,hint:S,quien:EN,accion:P_BE[pi]+' going to '+b[0]};
  case'habito':return{es:esForms(v,'pres')[i],hint:S+' · todos los días',quien:EN,accion:(pi===2||pi===3)?b[4]:b[0],cuando:'every day'};
  case'pregunta':{pi=rnd([1,2,3,5]);const j=eIdx(pi);
   return{es:'¿'+esForms(v,'pret')[j]+'?',hint:ES_SUBJ[pi],quien:P_EN[pi].toLowerCase(),accion:b[0]+'?',pre:'Did'}}
  case'negacion':return{es:'no '+esForms(v,'pret')[i],hint:S,quien:EN,accion:"didn't "+b[0]};
  case'futuro':return{es:esForms(v,'fut')[i],hint:S,quien:EN,accion:'will '+b[0]};
  case'condicional':return{es:esForms(v,'cond')[i],hint:S,quien:EN,accion:'would '+b[0]};
  case'antes':return{es:esForms(v,'impf')[i],hint:S+' · antes, muchas veces',quien:EN,accion:'used to '+b[0]};
  case'perfecto':return{es:HABER[pi]+' '+esForms(v,'part'),hint:S,quien:EN,accion:P_HAVE[pi]+' '+b[2]};
  case'pluscuam':return{es:HABIA[pi]+' '+esForms(v,'part'),hint:S,quien:EN,accion:'had '+b[2]};}}

function lvcBuild(){title('🧱 Hacer crecer la frase');

  if(/^the /.test(it.n))return it.v+' the '+a+' '+it.n.replace(/^the /,'');
  return it.v+' '+a+' '+it.n};

   <button class="b" onclick="document.getElementById('bw').textContent='${esc(base)}';spk('${esc(base)}','en')">∅ simple</button>

 </div>
 <div class="row"><button class="b g big" onclick="go(lvcBuild)">Otra frase →</button></div>`}

let INT=null;
function sosInt(){title('✋ ¡Interrumpa!');
 const pool=STORIES.filter(s=>s.lines.some(l=>l.traps));
 const mine=pool.filter(x=>x.lv===ST.level);
 const s=mine.length?rnd(mine):rnd(pool);
 INT={s,li:0,hits:0,traps:0,on:true,t0:0};
 main.innerHTML=`<p class="center muted">Voy a leer “${esc(s.tt)}”. Hay palabras-trampa A PROPÓSITO.
 Cuando oiga una palabra desconocida: ¡pare la historia con la frase correcta! Silencio de 3 segundos = punto perdido.
 <button class="spk sm" onclick="spk('Voy a leer una historia con palabras difíciles a propósito. Su trabajo no es entenderlo todo. Su trabajo es interrumpir: parar la historia y preguntar. Preguntar es ganar.','es')">🔊</button></p>
 <div class="card center" id="intBox"><p style="font-size:44px">👂</p><button class="b p big" onclick="intPlay()">▶️ Empezar</button></div>
 <div id="intQ"></div>`}
window.intPlay=async()=>{const s=INT.s;stopBar(true);
 while(INT.on&&INT.li<s.lines.length){
  const L=s.lines[INT.li],box=document.getElementById('intBox');
  if(box)box.innerHTML=`<p class="muted">frase ${INT.li+1}/${s.lines.length} · interrupciones ${INT.hits}/${INT.traps}</p>
   <p style="font-size:44px">👂</p>
   <p class="muted" style="filter:blur(6px);cursor:pointer" onclick="this.style.filter=''">${esc(L.en)}</p>`;
  await speakLine(L.en);
  if(!INT.on)return;
  if(L.traps){const w=Object.keys(L.traps)[0];INT.traps++;INT.t0=Date.now();
   const opts=shuf([{label:`What does "${w}" mean?`,ok:true},
    ...shuf(SOS.filter(c=>!c.aux&&c.n!==4)).slice(0,3).map(c=>({label:c.en,ok:false}))]);
   const qd=document.getElementById('intQ');
   if(qd)qd.innerHTML=`<p class="center" style="font-weight:800">⚡ ¡AHORA! ¿Qué dispara?</p>
    ${opts.map(o=>`<button class="opt" onclick="intAns(this,${o.ok},'${esc(w)}','${esc(L.traps[w]).replace(/'/g,"\\'")}')">${esc(o.label)}</button>`).join('')}`;
   return}
  INT.li++;
  await new Promise(r=>setTimeout(r,500));}
 if(INT.on)intEnd()};
window.intAns=(btn,ok,w,def)=>{const dt=((Date.now()-INT.t0)/1000).toFixed(1);
 btn.classList.add(ok?'ok':'no');if(ok)INT.hits++;
 gradeItem('s|4',ok,'SOS');track('sos',ok);
 const qd=document.getElementById('intQ');
 if(qd)qd.insertAdjacentHTML('beforeend',`<div class="note">${ok?(dt<3?'⚡ ¡'+dt+'s!':'✅ ('+dt+'s — más rápido la próxima)'):'👂 era: What does it mean?'} · “${esc(w)}” = ${esc(def)}</div>`);
 speakThen('What does '+w+' mean? ... '+w+'.','en',null,1100,()=>{const q=document.getElementById('intQ');if(q)q.innerHTML='';INT.li++;intPlay()})};
function intEnd(){INT.on=false;
 main.innerHTML=`<div class="card center"><p style="font-size:46px">${INT.hits>=INT.traps*0.75?'🏆':'💪'}</p>
 <p class="score">${INT.hits}/${INT.traps} interrupciones</p>
 <p class="muted">En la vida real es igual: la pregunta a tiempo vale más que entenderlo todo.</p>
 <div class="row"><button class="b p big" onclick="go(sosInt)">Otra historia</button></div></div>`}

function framesHome(){title('🧩 Frases listas');
 main.innerHTML=`<p class="center muted">No calcule — use el marco y cambie UNA pieza.
 <button class="spk sm" onclick="spk('No construya cada frase desde cero. Use el marco completo y cambie solo una pieza.','es')">🔊</button></p>

// rellena 1 o 2 huecos: "feliz / mi familia está aquí" → hueco1 / hueco2
function fillFrame(tpl,fill){let out=tpl;
 for(const part of String(fill).split(' / '))out=out.replace('___',part);
 return out}
function frameScr(i){title('🧩 Marcos');
 const f=FRAMES[i];if(!f){main.innerHTML=`<div class="card center">🎉 ¡Todos los marcos! <button class="b p big" onclick="go(frameScr,0)">Otra vez</button></div>`;return}
 const ex=f.fill.map(x=>x.split('|'));
 main.innerHTML=`<div class="progress"><div style="width:${i/FRAMES.length*100}%"></div></div>
 <div class="card center">
  <p class="bigword en" style="font-size:30px">${esc(f.en)} <button class="spk" onclick="spk('${esc(f.en.replace('___','...')).replace(/'/g,"\\'")}','en')">🔊</button></p>
  <p class="muted">${esc(f.es)}</p>
  <div class="list" style="margin-top:10px">${ex.map(e=>{const full=fillFrame(f.en,e[0]),fes=fillFrame(f.es,e[1]||'');
   return `<div class="storyline"><button class="spk sm" onclick="spk('${esc(full).replace(/'/g,"\\'")}','en')">🔊</button>
   <div class="txt">${esc(full)}<span class="es">${esc(fes)}</span></div></div>`}).join('')}</div>
  ${recBar(fillFrame(f.en,ex[0][0]))}
 </div>
 <div class="row"><button class="b" onclick="go(frameScr,${Math.max(0,i-1)})">←</button>
 <span class="muted">${i+1}/${FRAMES.length}</span>
 <button class="b g" onclick="go(frameScr,${i+1})">Siguiente →</button></div>`}
let pq=null;
function prepScr(){title('🔗 Palabritas pegadas');
 if(!pq||pq.done)pq={i:0,ok:0,items:shuf(PREPS).slice(0,10)};
 const q=pq.items[pq.i];
 if(!q){pq.done=true;main.innerHTML=`<div class="card center"><p class="score">${pq.ok}/10</p>
  <button class="b p big" onclick="pq=null;go(prepScr)">Otra vez</button></div>`;return}
 const gap=q.en.replace(PREP_RE,'___');
 const opts=shuf(PREP_POOL.filter(o=>o!==q.key)).slice(0,3);
 opts.push(q.key);
 main.innerHTML=`<div class="progress"><div style="width:${pq.i*10}%"></div></div>
 <p class="note">La palabrita va PEGADA a la palabra — apréndalas juntas, como una sola.</p>
 <div class="card center"><p class="muted">${esc(q.es)}</p>
 <p class="bigword en" style="font-size:30px">${esc(gap)}</p></div>
 <div class="row">${shuf(opts).map(o=>`<button class="b big" style="width:46%" onclick="pAns(this,'${o}')">${o.toUpperCase()}</button>`).join('')}</div>`}
window.pAns=(btn,o)=>{const q=pq.items[pq.i],ok=o===q.key;
 btn.style.background=ok?'var(--good)':'var(--bad)';btn.style.color='#fff';if(ok)pq.ok++;
 gradeItem('p|'+q.en,ok,'preposición pegada');track('preps',ok);
 speakThen(q.en.toLowerCase(),'en',null,900,()=>{pq.i++;prepScr()});};
let sp=null;
function speedScr(){title('🏁 Batalla de velocidad');
 if(!sp||sp.done){
  const base=shuf(SPEED).slice(0,20),nTrue=8+Math.floor(Math.random()*5); // 8~12 correctas, al azar
  const flags=shuf(Array.from({length:20},(_,k)=>k<nTrue));
  const items=base.map((q,k)=>{let shown=q.en;
   if(!flags[k]){let w;do{w=rnd(SPEED)}while(w.en===q.en);shown=w.en}
   return{es:q.es,en:q.en,shown,match:flags[k]}});
  sp={i:0,ok:0,items,t0:Date.now()};}
 const q=sp.items[sp.i];
 if(!q){sp.done=true;const secs=Math.round((Date.now()-sp.t0)/1000),pass=sp.ok>=15;
  main.innerHTML=`<div class="card center"><p style="font-size:46px">${pass?'🏆':'💪'}</p>
  <p class="score">${sp.ok}/20 · ${secs}s</p><p class="muted">${pass?'¡Pasó la línea del 75%!':'Línea de paso: 15 — ¡otra vez!'}</p>
  <button class="b p big" onclick="sp=null;go(speedScr)">Otra ronda</button></div>`;return}
 main.innerHTML=`<div class="progress"><div style="width:${sp.i*5}%"></div></div>
 <div class="card center"><p class="muted">¿La traducción es correcta? ⏱️</p>
 <p class="bigword es" style="font-size:26px">${esc(q.es)}</p>
 <p style="font-size:22px;margin:6px 0">⬇️</p>
 <p class="bigword en" style="font-size:25px">${esc(q.shown)} <button class="spk sm" onclick="spk('${esc(q.shown).replace(/'/g,"\\'")}','en')">🔊</button></p>
 <div class="row" id="marks">
  <button class="b g big" style="width:46%" onclick="spMark(true)">✅ Correcta</button>
  <button class="b r big" style="width:46%" onclick="spMark(false)">❌ Está mal</button></div>
 <div id="spFb"></div>
 </div>`}
window.spMark=(ans)=>{const q=sp.items[sp.i],right=ans===q.match;if(right)sp.ok++;
 gradeItem('sp|'+q.es,right,'velocidad');track('speed',right);
 document.getElementById('marks').style.display='none';
 document.getElementById('spFb').innerHTML=`<div class="note ${right?'':'w'}">${right?'✅':'❌'} ${q.match?'Era correcta.':'Era falsa. La buena: <b>'+esc(q.en)+'</b>'}</div>`;
 speakThen(q.en,'en',null,right?500:1300,()=>{sp.i++;speedScr()});};

function storiesHome(){title('🎧 Historias');
 main.innerHTML=`${levelBar()}
 <p class="center muted">Primero el OÍDO, después los ojos.
 <button class="spk sm" onclick="spk('Escuche la historia primero, sin leer. Después escuche otra vez leyendo. Al final, repita usted.','es')">🔊</button></p>
 <div class="list">
  <div class="litem" style="background:#eff6ff" onclick="go(booksHome)"><span class="ico">📖</span><div class="tx"><b>Cuentos clásicos</b><small>leer y escuchar · velocidad · su voz favorita</small></div>›</div>
 ${STORIES.filter(s=>s.lv===ST.level||true).map((s,ix)=>`
  <div class="litem" style="${s.lv!==ST.level?'opacity:.5':''}" onclick="go(storyScr,${ix})">
  <span class="ico">${s.ico||'🎧'}</span><div class="tx"><b>${esc(s.tt)}</b><small>${s.lv} · ${s.lines.length} frases${s.dialog?' · diálogo':''}</small></div>›</div>`).join('')}
 </div>`}
let stShow=false,stES=false,SCAST={},SCASTHD={};
// reparto: cada personaje recibe una voz distinta (género y acento variados, al azar)
function buildCast(s){SCAST={};SCASTHD={};if(!s.dialog)return;
 const who=[...new Set(s.lines.filter(l=>l.who).map(l=>l.who))];
 // reparto HD primero (no depende de las voces del teléfono)
 if(ST.hd&&HD.lib){const hv=HD_VOICES.filter(v=>v.l==='en'&&HD.stored.includes(v.id));
  if(hv.length){const F=shuf(hv.filter(v=>v.g==='👩')),M=shuf(hv.filter(v=>v.g==='👨'));
   const sF=Math.random()<0.5;let pal2=[];
   for(let i=0;i<who.length;i++){const pick=(sF?i%2===0:i%2===1)?(F.shift()||M.shift()):(M.shift()||F.shift());
    if(pick)pal2.push(pick.id)}
   if(!pal2.length)pal2=hv.map(v=>v.id);
   who.forEach((w,i)=>{SCASTHD[w]=pal2[i%pal2.length]})}}
 let evs=enVoices().filter(v=>vScore(v,'en-us')>0);if(!evs.length)return;
 const prem=evs.filter(isPremium);if(prem.length>=2)evs=prem; // reparto solo con voces premium si las hay
 const seen={},fem=[],mas=[],neu=[];
 for(const v of evs){const k=v.lang+(FEM_RE.test(v.name.toLowerCase())?'f':MASC_RE.test(v.name.toLowerCase())?'m':'n');
  if(seen[k])continue;seen[k]=1;
  (FEM_RE.test(v.name.toLowerCase())?fem:MASC_RE.test(v.name.toLowerCase())?mas:neu).push(v)}
 const F=shuf(fem),M=shuf(mas),N=shuf(neu);
 let pal=[];const startF=Math.random()<0.5; // combinación al azar: M/F, F/F, F/M…
 for(let i=0;i<who.length;i++){const pick=(startF?i%2===0:i%2===1)?(F.shift()||M.shift()||N.shift()):(M.shift()||F.shift()||N.shift());
  if(pick)pal.push(pick)}
 if(!pal.length)pal=evs.slice(0,2);
 who.forEach((w,i)=>{SCAST[w]=pal[i%pal.length]})}
window.spkWho=(text,who,rate)=>{try{speechSynthesis.cancel()}catch(e){}
 stopHdAudio();
 if(hdOK('en')){hdSpeak(text,'en',rate,(who&&SCASTHD[who])||null);return}
 try{const u=new SpeechSynthesisUtterance(text);u.lang='en-US';
 const v=(who&&SCAST[who])||pickVoice('en');if(v)u.voice=v;
 u.rate=rate||ST.rate||0.92;speechSynthesis.speak(u);}catch(e){}};
function storyScr(ix){title((STORIES[ix].ico||'🎧')+' '+STORIES[ix].tt);
 const s=STORIES[ix];stShow=stShow||false;buildCast(s);
 main.innerHTML=`
 <div class="row" style="margin-bottom:6px">
  <button class="b p" onclick="playAll(${ix},0.75)">🐢 Escuchar lento</button>
  <button class="b p" onclick="playAll(${ix},1)">🔊 Normal</button>
  <button class="b" onclick="stShow=!stShow;go(storyScr,${ix})">${stShow?'🙈 Ocultar texto':'👀 Ver texto'}</button>
  <button class="b" onclick="stES=!stES;go(storyScr,${ix})">${stES?'ES ✓':'ES'}</button>
  <button class="b" onclick="ST.notice=!ST.notice;save();go(storyScr,${ix})" title="resaltar las formas del inglés">${ST.notice?'🔍 Formas ✓':'🔍 Formas'}</button></div>
 ${s.lines.map((L,li)=>{
  let txt=esc(L.en);
  if(L.traps)for(const w in L.traps)txt=txt.replace(new RegExp('\\b'+w+'\\b','i'),m=>`<span class="trap" onclick="event.stopPropagation();trapTap('${esc(w)}','${esc(L.traps[w]).replace(/'/g,"\\'")}')">${m}</span>`);
  txt=noticeHL(txt);
  return `<div class="storyline ${stShow?'':'hide'}" onclick="this.classList.remove('hide')">
   <button class="spk sm" onclick="event.stopPropagation();spkWho('${esc(L.en).replace(/'/g,"\\'")}','${L.who?esc(L.who).replace(/'/g,"\\'"):''}',0.85)">🔊</button>
   <div class="txt">${L.who?`<b>${esc(L.who)}:</b> `:''}${txt}${stES?`<span class="es">${esc(L.es)}</span>`:''}</div>
   <button class="spk sm" style="background:#fef3c7;color:#b45309" title="repetir yo" onclick="event.stopPropagation();toggleRec(this,'')">🎙️</button>
  </div>`}).join('')}
 <p class="note">🪤 Palabras amarillas = trampa. Tóquelas y pregunte: <b>What does it mean?</b>${ST.notice?' · 🔍 Lo azul = las formas que el inglés usa — solo nótelas.':''}</p>
 <div class="card center"><p><b>Ahora usted 🗣️</b> — repita la historia con su voz</p>${recBar(s.lines.map(l=>l.en).join(' '))}</div>
 ${SES.on&&SES.stage===1?'<button class="b g big" onclick="sesNext()">✅ Hecho — seguir la sesión →</button>':''}`}
window.trapTap=(w,def)=>{spk('What does '+w+' mean?','en');
 setTimeout(()=>alert('What does "'+w+'" mean?\n→ '+def),300);};
let playing=false;
window.playAll=async(ix,rate)=>{const s=STORIES[ix];if(playing){stopAll();return}
 playing=true;stopBar(true);
 for(const L of s.lines){ if(!playing)break;
  if(hdOK('en')){await hdSpeak(L.en,'en',rate,(L.who&&SCASTHD[L.who])||null);}
  else await new Promise(res=>{const u=new SpeechSynthesisUtterance(L.en);u.lang='en-US';
   const v=(L.who&&SCAST[L.who])||pickVoice('en');if(v)u.voice=v;u.rate=rate;
   let done=false;const fin=()=>{if(!done){done=true;res()}};
   u.onend=fin;u.onerror=fin;setTimeout(fin,2500+L.en.length*120);speechSynthesis.speak(u);});
  if(!playing)break;
  await new Promise(r=>setTimeout(r,800));}
 playing=false;stopBar(false);};
// ================= CUENTOS (leer y escuchar) =================
function enVoices(){return VOICES.filter(v=>v.lang.replace('_','-').toLowerCase().startsWith('en')).sort((a,b)=>vScore(b,'en-us')-vScore(a,'en-us'))}
const isPremium=v=>/natural|neural|premium|enhanced|plus|hd\b/i.test(v.name);
function voiceSelHTML(){let evs=enVoices().filter(v=>vScore(v,'en-us')>0);
 if(!evs.length)return '';
 // SOLO voces de grado premium; las de baja calidad no aparecen
 const prem=evs.filter(isPremium);
 let top,noPrem=false;
 if(prem.length){top=prem.slice(0,8);
  const fem=prem.find(v=>FEM_RE.test(v.name.toLowerCase())),mas=prem.find(v=>MASC_RE.test(v.name.toLowerCase()));
  for(const g of [fem,mas])if(g&&!top.includes(g))top.push(g);
 }else{top=evs.slice(0,2);noPrem=true} // sin premium en el equipo: mínimo para no quedar mudo
 const tag=v=>FEM_RE.test(v.name.toLowerCase())?'👩 ':MASC_RE.test(v.name.toLowerCase())?'👨 ':'';
 return `<select id="vsel" onchange="ST.voiceEN=this.value||null;save();spk('Hello! I am your new voice.','en')">
  <option value="">🗣️ Voz: automática (👩 EE.UU., la mejor)</option>
  ${top.map(v=>`<option value="${esc(v.name)}" ${ST.voiceEN===v.name?'selected':''}>${tag(v)}${esc(v.name.replace(/Microsoft |Google |com\.apple\.[a-z.]+/i,''))} · ${esc(v.lang)}</option>`).join('')}
  ${noPrem?'<option disabled>⬇️ Instale voces Premium — vea ❓ Ayuda</option>':''}</select>`}
function rateSlider(){const r=parseFloat(ST.rate)||0.95;
 return `<span class="ratewrap">🐢<input type="range" id="rateSl" min="0.5" max="2" step="0.05" value="${r}"
  oninput="ST.rate=parseFloat(this.value);save();const v=document.getElementById('rateVal');if(v)v.textContent=ST.rate.toFixed(2)+'×'"
  onchange="spk('This is my reading speed.','en')">🐇<b id="rateVal">${r.toFixed(2)}×</b></span>`}
function booksHome(){title('📖 Cuentos clásicos');
 main.innerHTML=`${levelBar()}
 <p class="center muted">Cuentos famosos en inglés — siga el texto con los ojos mientras escucha.
 <button class="spk sm" onclick="spk('Escuche el cuento y siga el texto con los ojos. La frase que suena se pinta de amarillo. Puede repetir una parte, cambiar la velocidad y elegir la voz.','es')">🔊</button></p>
 ${[['esopo','🦊 Fábulas de Esopo'],['hadas','🧚 Cuentos de hadas'],['arabes','🌙 Las mil y una noches'],['sabiduria','📜 Sabiduría — Talmud y más'],['clasicos','🏛️ Clásicos famosos']].map(([cat,head])=>{

let bkES=false;
function bookScr(ix){title('📖 '+BOOKS[ix].tt);
 const s=BOOKS[ix],pos=ST.bookPos[s.id]||0;
 RD.a=RD.story===ix?RD.a:null;RD.b=RD.story===ix?RD.b:null;RD.sel=0;RD.story=ix;
 main.innerHTML=`
 <div class="readbar">
  <button class="b p" id="bkBtn" onclick="bkPlay(${ix})">▶️ ${pos>0?'Continuar':'Leer'}</button>

 </div>
 <p class="center muted" id="bkHint" style="font-size:15px">Toque una frase para empezar desde allí 👆</p>
 ${s.lines.map((L,li)=>`<div class="bline ${li===pos?'cur':''} ${RD.a===li?'mA':''} ${RD.b===li?'mB':''}" id="bl${li}" onclick="bkTap(${ix},${li})">

   <div class="txt">${noticeHL(esc(L.en))}${bkES?`<span class="es">${esc(L.es)}</span>`:''}</div>
   <button class="spk sm" onclick="event.stopPropagation();spk('${esc(L.en).replace(/'/g,"\\'")}','en')">🔊</button>
  </div>`).join('')}
 <div class="card center"><p><b>Ahora usted 🗣️</b> — lea en voz alta y grábese</p>${recBar(s.lines[pos]?s.lines[pos].en:s.lines[0].en)}</div>
 ${SES.on&&SES.stage===1?'<button class="b g big" onclick="sesNext()">✅ Hecho — seguir la sesión →</button>':''}`}
function hiLine(ix,li){document.querySelectorAll('.bline').forEach(e=>e.classList.remove('cur'));
 const e=document.getElementById('bl'+li);if(e){e.classList.add('cur');e.scrollIntoView({block:'center',behavior:'smooth'})}}
function speakLine(text){
 if(hdOK('en'))return hdSpeak(text,'en',ST.rate);
 return new Promise(res=>{try{
 const u=new SpeechSynthesisUtterance(text);u.lang='en-US';

const DAYMS=864e5, dayNum=()=>Math.floor(Date.now()/DAYMS);

 const r=ST.srs[key]||(ST.srs[key]={b:0,d:dayNum(),n:0,w:0,fs:0});
 r.n++;
 if(ok){r.b=Math.min(4,r.b+1);r.d=dayNum()+IV[r.b];
  if(r.w>0&&!r.fx){if(r.lod!==dayNum()){r.fs=(r.fs||0)+1;r.lod=dayNum()}
   if(r.fs>=3){r.fx=1}} // error vencido: 3 aciertos en días distintos
 }else{r.b=0;r.d=dayNum();r.w++;r.fs=0;if(tag)r.t=tag}
 if(SES.on&&!SES.keys.includes(key))SES.keys.push(key);
